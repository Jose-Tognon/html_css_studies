<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        body{
            background-image: linear-gradient(to bottom,white,blue);
            background-attachment: fixed;
        }
        main{
            margin: auto;
            width: 600px;
            padding: 10px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 5px 5px 15px black;
        }
        h1{
            color: aqua;
            background-color: blue;
        }
        p{
            text-align: justify;
            text-indent: 20px;
        }
    </style>
</head>
<body>
    <main>
        <h1>Testando Gradiente</h1>
        <h2>Colocando Texto</h2>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Esse deleniti eum eos at libero, pariatur cum temporibus alias dolores similique illo optio, quisquam eligendi! Natus officia dolores earum modi ratione!</p>
    </main>
</body>
</html>
