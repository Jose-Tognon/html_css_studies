<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /* 
        # = id
        . = class
        : = pseudo-class(hover)
        :: = pseudo-element(after)
        > = children   
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color:darkred;
        }
        a:hover{
            color: aqua;
        }
        a::after{
            content: " [Maluco]";
            text-decoration: none;
            color: blue;
        }
        a.teste:hover{
            text-decoration: underline;
            color: gold;
        }
        a.teste::after{
            content: ' [LINK]';
            color: gold;
        }

    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://github.com/Jose-Tognon" target="_blank">Repositório Github</a></li>
        <li><a href="https://www.youtube.com/watch?v=vMlrcOVr7po&list=PLHz_AreHm4dlUpEXkY1AyVLQGcpSgVF8s&index=22" target="_blank">Canal do Youtube</a></li>
        <li><a href="https://www.youtube.com" class="teste">Site do Youtube</a></li>
    </ul>
</body>
</html>
